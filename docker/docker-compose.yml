services:
  postgres:
    image: postgres:16-alpine
    container_name: backend-study-postgres
    environment:
      POSTGRES_USER: study
      POSTGRES_PASSWORD: study
    ports:
      - "5432:5432"
    volumes:
      - ./postgres/init:/docker-entrypoint-initdb.d

  redis:
    image: redis:7-alpine
    container_name: backend-study-redis
    ports:
      - "6379:6379"

