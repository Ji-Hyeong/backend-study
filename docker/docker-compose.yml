services:
  postgres:
    image: postgres:16-alpine
    container_name: backend-lab-postgres
    environment:
      POSTGRES_USER: lab
      POSTGRES_PASSWORD: lab
    ports:
      - "5432:5432"
    volumes:
      - ./postgres/init:/docker-entrypoint-initdb.d

  redis:
    image: redis:7-alpine
    container_name: backend-lab-redis
    ports:
      - "6379:6379"

