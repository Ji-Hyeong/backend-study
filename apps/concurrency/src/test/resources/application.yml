spring:
  datasource:
    url: jdbc:h2:mem:concurrency_study;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    hikari:
      maximum-pool-size: 25
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false

logging:
  level:
    concurrency-study: INFO
    com.jihyeong.study.concurrency: INFO
