server:
  port: 8081

spring:
  application:
    name: transaction
  datasource:
    url: jdbc:h2:mem:transaction_study;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
  h2:
    console:
      enabled: true
      path: /h2-console

study:
  payment:
    toss:
      enabled: false
      base-url: https://api.tosspayments.com
      secret-key: ${STUDY_PAYMENT_TOSS_SECRET_KEY:}
