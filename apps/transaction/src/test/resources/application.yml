spring:
  datasource:
    url: jdbc:h2:mem:transaction_study;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
  h2:
    console:
      enabled: false

logging:
  level:
    root: warn
    transaction-study: info
    com.jihyeong.study.transaction: info
    org.springframework.test.context: warn
    org.springframework.boot.test.context: warn
    org.hibernate: warn
