server:
  port: 8084

spring:
  application:
    name: auth
  data:
    redis:
      host: localhost
      port: 6379

auth:
  jwt:
    secret: ${AUTH_JWT_SECRET:backend-study-auth-signing-secret-must-be-long-enough}

study:
  auth:
    # localмқҖ мқҙ м ҖмһҘмҶҢмқҳ HMAC JWTлҘј, keycloakмқҖ OIDC issuerмқҳ м„ңлӘ… нӮӨлҘј кІҖмҰқн•ңлӢӨ.
    authentication-provider: local
    refresh-token-store: redis
